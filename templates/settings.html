<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomePLC - Settings</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.settings-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
}

.form-group {
    margin-bottom: 14px;
}

.form-group label {
    display: block;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 4px;
}

.form-group input[type="text"],
.form-group input[type="number"],
.form-group input[type="password"],
.form-group input[type="email"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 0.9rem;
    font-family: inherit;
}

.form-group input:focus {
    outline: none;
    border-color: var(--accent);
}

.form-row {
    display: flex;
    gap: 16px;
}

.form-row .form-group {
    flex: 1;
}

.toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
}

.toggle-row label {
    font-size: 0.95rem;
    color: var(--text);
    cursor: pointer;
}

.toggle-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
    cursor: pointer;
}

.status-msg {
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 0.85rem;
    margin-bottom: 12px;
    display: none;
}

.status-msg.success {
    display: block;
    background: rgba(46, 204, 113, 0.15);
    border: 1px solid var(--green);
    color: var(--green);
}

.status-msg.error {
    display: block;
    background: rgba(231, 76, 60, 0.15);
    border: 1px solid var(--red);
    color: var(--red);
}

.alert-log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
}

.alert-log-table th {
    text-align: left;
    padding: 8px 10px;
    background: var(--bg);
    color: var(--text-dim);
    font-weight: 600;
    border-bottom: 1px solid var(--card-border);
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
}

.alert-log-table td {
    padding: 6px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
}

.alert-log-table tr:hover td {
    background: rgba(255,255,255,0.03);
}

.alert-status-sent {
    color: var(--green);
    font-weight: 600;
}

.alert-status-error {
    color: var(--red);
    font-weight: 600;
}

.log-container {
    max-height: 400px;
    overflow-y: auto;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div style="display:flex; align-items:center; gap:16px;">
        <h1>HomePLC Settings</h1>
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/viz" class="nav-link">Visualization</a>
        <a href="/history" class="nav-link">History</a>
    </div>
    <div class="conn-status">
        <span id="connText">Connecting...</span>
        <div id="connDot" class="conn-dot"></div>
    </div>
</div>

<div class="settings-container">

    <!-- Alert Config Card -->
    <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
            <h2>Email Alert Configuration</h2>
        </div>
        <div class="card-body">
            <div id="statusMsg" class="status-msg"></div>

            <div class="toggle-row">
                <input type="checkbox" id="alertEnabled">
                <label for="alertEnabled">Enable email alerts</label>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>SMTP Server</label>
                    <input type="text" id="smtpServer" placeholder="smtp.gmail.com">
                </div>
                <div class="form-group" style="max-width:120px;">
                    <label>Port</label>
                    <input type="number" id="smtpPort" value="587">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Username / Email</label>
                    <input type="text" id="smtpUser" placeholder="user@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="smtpPassword" placeholder="app password">
                </div>
            </div>

            <div class="form-group">
                <label>Recipients (comma-separated)</label>
                <input type="text" id="recipients" placeholder="user1@example.com, user2@example.com">
            </div>

            <div class="form-group">
                <label>Cooldown (minutes between repeat alerts)</label>
                <input type="number" id="cooldownMinutes" value="30" min="1" max="1440">
            </div>

            <div class="btn-row">
                <button class="btn btn-green" onclick="saveConfig()">Save Settings</button>
                <button class="btn" onclick="sendTest()">Send Test Email</button>
            </div>
        </div>
    </div>

    <!-- Recent Alerts Card -->
    <div class="card">
        <div class="card-header">
            <h2>Recent Alerts</h2>
            <button class="btn" onclick="loadLog()" style="font-size:0.75rem;">Refresh</button>
        </div>
        <div class="card-body">
            <div class="log-container">
                <table class="alert-log-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Tag</th>
                            <th>Message</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="alertLogBody">
                        <tr><td colspan="4" style="color:var(--text-dim); text-align:center; padding:20px;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
// Load current config
async function loadConfig() {
    try {
        const resp = await fetch('/api/alerts/config');
        const cfg = await resp.json();
        document.getElementById('alertEnabled').checked = cfg.enabled || false;
        document.getElementById('smtpServer').value = cfg.smtp_server || '';
        document.getElementById('smtpPort').value = cfg.smtp_port || 587;
        document.getElementById('smtpUser').value = cfg.smtp_user || '';
        document.getElementById('smtpPassword').value = cfg.smtp_password || '';
        document.getElementById('recipients').value = (cfg.recipients || []).join(', ');
        document.getElementById('cooldownMinutes').value = cfg.cooldown_minutes || 30;
    } catch(e) {
        showStatus('Failed to load config: ' + e.message, 'error');
    }
}

async function saveConfig() {
    const cfg = {
        enabled: document.getElementById('alertEnabled').checked,
        smtp_server: document.getElementById('smtpServer').value.trim(),
        smtp_port: parseInt(document.getElementById('smtpPort').value) || 587,
        smtp_user: document.getElementById('smtpUser').value.trim(),
        smtp_password: document.getElementById('smtpPassword').value,
        recipients: document.getElementById('recipients').value.split(',').map(s => s.trim()).filter(s => s),
        cooldown_minutes: parseInt(document.getElementById('cooldownMinutes').value) || 30,
    };
    try {
        const resp = await fetch('/api/alerts/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(cfg)
        });
        const result = await resp.json();
        if (result.success) {
            showStatus('Settings saved.', 'success');
        } else {
            showStatus('Save failed: ' + (result.error || 'unknown'), 'error');
        }
    } catch(e) {
        showStatus('Save failed: ' + e.message, 'error');
    }
}

async function sendTest() {
    showStatus('Sending test email...', 'success');
    try {
        const resp = await fetch('/api/alerts/test', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: '{}'
        });
        const result = await resp.json();
        if (result.success) {
            showStatus('Test email sent successfully.', 'success');
        } else {
            showStatus('Test failed: ' + (result.error || 'check server logs'), 'error');
        }
    } catch(e) {
        showStatus('Test failed: ' + e.message, 'error');
    }
    loadLog();
}

async function loadLog() {
    try {
        const resp = await fetch('/api/alerts/log');
        const entries = await resp.json();
        const tbody = document.getElementById('alertLogBody');
        if (entries.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim); text-align:center; padding:20px;">No alerts yet</td></tr>';
            return;
        }
        let html = '';
        for (const entry of entries) {
            const ts = new Date(entry.timestamp);
            const timeStr = ts.toLocaleDateString() + ' ' + ts.toLocaleTimeString();
            const statusClass = entry.status === 'sent' ? 'alert-status-sent' : 'alert-status-error';
            html += `<tr>
                <td>${timeStr}</td>
                <td style="font-family:monospace; font-size:0.75rem;">${entry.tag}</td>
                <td>${entry.message}</td>
                <td class="${statusClass}">${entry.status.toUpperCase()}</td>
            </tr>`;
        }
        tbody.innerHTML = html;
    } catch(e) {
        console.error('Failed to load alert log:', e);
    }
}

function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
    if (type === 'success') {
        setTimeout(() => { el.className = 'status-msg'; }, 5000);
    }
}

// Connection status
async function checkConn() {
    try {
        const resp = await fetch('/api/data');
        const data = await resp.json();
        const conn = data._plc_connected;
        const isSim = data._sim_mode;
        document.getElementById('connDot').className = 'conn-dot' + (conn ? ' connected' : '');
        document.getElementById('connText').textContent = isSim ? 'SIMULATION' : (conn ? 'PLC Connected' : 'Disconnected');
    } catch(e) {
        document.getElementById('connDot').className = 'conn-dot';
        document.getElementById('connText').textContent = 'HMI Server Error';
    }
}

// Init
loadConfig();
loadLog();
checkConn();
setInterval(checkConn, 5000);
setInterval(loadLog, 30000);
</script>

</body>
</html>
